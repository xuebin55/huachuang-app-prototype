nd:#0711269e;color:#dce7ff;text-align:left}.factor-chip b{display:block;font-size:12px}.factor-chip small{display:block;margin-top:4px;color:#8fa1c8;font-size:10px;line-height:1.35}.qa-input-voice{display:none;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#2a56cc 0%,#3464e0 50%,#4a7ae8 100%);border-radius:24px;padding:16px 20px;cursor:pointer;user-select:none}.qa-voice-top{display:flex;align-items:center;gap:12px}.qa-voice-icon svg{width:20px;height:20px;color:#fff}.qa-voice-text{font-size:15px;font-weight:500;color:#fff;letter-spacing:2px}.qa-voice-hint{font-size:11px;color:#ffffff99;margin-top:4px}.qa-input-recording{display:none;position:fixed;inset:0;background:#050810f2;z-index:1000;flex-direction:column;align-items:center;justify-content:center}.qa-recording-content{display:flex;flex-direction:column;align-items:center;gap:24px}.qa-recording-text{font-size:15px;color:#ffffff80;letter-spacing:1px}.qa-recording-wave{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:60px}.qa-wave-bar{width:3px;background:linear-gradient(180deg,#4a7ae8,#3464e0);border-radius:2px;animation:wave .8s ease-in-out infinite}.qa-wave-bar:nth-child(1){height:20px;animation-delay:0s}.qa-wave-bar:nth-child(2){height:35px;animation-delay:.1s}.qa-wave-bar:nth-child(3){height:50px;animation-delay:.2s}.qa-wave-bar:nth-child(4){height:40px;animation-delay:.15s}.qa-wave-bar:nth-child(5){height:55px;animation-delay:.25s}.qa-wave-bar:nth-child(6){height:30px;animation-delay:.05s}.qa-wave-bar:nth-child(7){height:45px;animation-delay:.3s}.qa-wave-bar:nth-child(8){height:25px;animation-delay:.12s}.qa-wave-bar:nth-child(9){height:38px;animation-delay:.22s}.qa-recording-cancel{font-size:13px;color:#ffffff66;margin-top:8px}.qa-feedback{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(14px);opacity:0;transition:.24s;background:#eef4ff;color:#12265b;border-radius:13px;padding:9px 13px;font-size:11px;z-ind <body>
  <main class="phone">
    <div class="status"><span>9:41</span><span>▮▮▮　◔　▰</span></div>
    <div class="content" id="content">
      <nav><button class="back" onclick="history.back()">‹</button><b class="title">模型对话</b><button class="history-btn" id="historyBtn" aria-label="历史会话">◷</button></nav>
      <section class="chat" id="chat"></section>
    </div>
    <div class="history-scrim" id="historyScrim"></div><aside class="history-panel" id="historyPanel"><h3>历史会话</h3><p>恢复在当前模型下的追问和复核结果。</p><div class="history-list" id="historyList"></div></aside>

    function klineSvg(seed=0){const data=Array.from({length:14},(_,i)=>{const base=58+seed*2+i*.9,open=base+Math.sin((i+seed)*1.4)*5,close=open+(i%4===0?-4:3)+Math.cos(i+seed)*2,high=Math.max(open,close)+3+(i%3),low=Math.min(open,close)-3-(i%2),vol=24+((i*7+seed*5)%32);return{open,close,high,low,vol,up:close>=open}}),min=Math.min(...data.map(d=>d.low))-2,max=Math.max(...data.map(d=>d.high))+2,sy=v=>92-(v-min)/(max-min)*72,sx=i=>18+i*16,ma5=data.map((d,i)=>({x:sx(i),y:sy(data.slice(Math.max(0,i-4),i+1).reduce((a,b)=>a+b.close,0)/(Math.min(i+1,5)))})),ma10=data.map((d,i)=>({x:sx(i),y:sy(data.slice(Math.max(0,i-9),i+1).reduce((a,b)=>a+b.close,0)/(Math.min(i+1,10)))})),path=a=>a.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' '),candles=data.map((d,i)=>{const x=sx(i),color=d.up?'#ff5f6d':'#35d39e',y=Math.min(sy(d.open),sy(d.close)),h=Math.max(4,Math.abs(sy(d.open)-sy(d.close)));return`<line x1="${x}" y1="${sy(d.high).toFixed(1)}" x2="${x}" y2="${sy(d.low).toFixed(1)}" stroke="${color}" stroke-width="1"/><rect x="${x-4}" y="${y.toFixed(1)}" width="8" height="${h.toFixed(1)}" rx="1.5" fill="${color}"/><rect x="${x-4}" y="${(128-d.vol*.55).toFixed(1)}" width="8" height="${(d.vol*.55).toFixed(1)}" rx="1" fill="${color}" opacity=".55"/>`}).join(''),buy=data[3],sell=data[10];return`<div class="kline-head"><b>K线信号</b><div class="kline-legend"><span><i class="ma5"></i>MA5</span><span><i class="ma10"></i>MA10</span></div></div><svg class="kline-svg" viewBox="0 0 242 150" aria-label="K线、均线、成交量和买卖点"><line x1="8" y1="98" x2="234" y2="98" stroke="#ffffff14"/><line x1="8" y1="130" x2="234" y2="130" stroke="#ffffff14"/><path d="${path(ma5)}" fill="none" stroke="#ffd166" stroke-width="1.5"/><path d="${path(ma10)}" fill="none" stroke="#5ac8ff" stroke-width="1.5"/>${candles}<circle cx="${sx(3)}" cy="${sy(buy.low)-8}" r="8" fill="#ff5f6d"/><text class="bs-tag" x="${sx(3)}" y="${sy(buy.low)-5}" text-anchor="middle" fill="#fff">B</text><circle cx="${sx(10)}" cy="${sy(sell.high)-10}" r="8" fill="#35d39e"/><text class="bs-tag" x="${sx(10)}" y="${sy(sell.high)-7}" text-anchor="middle" fill="#06281d">S</text></svg><div class="kline-hint"><span>红涨绿跌 · 成交量同步</span><span>B 买点 / S 卖点</span></div>`}
    function toggleStockChart(btn){btn.closest('.stock').classList.toggle('expanded')}
    function renderStockCard(limit=poolSizes[p]||5,target=null){const added=new Set(newCodes[p]||[]),removed=removedMap[p]||removedMap.price;const rows=stocks.slice(0,limit).map((s,i)=>`<div class="stock ${added.has(s[1])?'new':''}"><div class="stock-top"><b class="rank">${i+1}</b><div class="stock-main"><div><span class="stock-name">${s[0]}</span><span class="stock-code">${s[1]}</span>${added.has(s[1])?'<span class="new-tag">新增</span>':''}</div><div class="stock-note">${s[4]}</div></div><div class="stock-price">${s[2]}<div class="stock-change ${s[3][0]=='-'?'down':''}">${s[3]}</div></div><button class="stock-toggle" type="button" onclick="toggleStockChart(this)" aria-label="展开K线图"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button></div><div class="kline-panel">${klineSvg(i)}</div></div>`).join('');const removedHtml=`<section class="removed-group"><div class="removed-head"><b>本次删除股票</b><span>${removed.length} 只</span></div><div class="removed-list">${removed.map(r=>`<div class="removed-item"><b>${r[0]}</b><code>${r[1]}</code><p>${r[2]}</p></div>`).join('')}</div></section>`;const el=document.createElement('article');el.className='ai-card';el.innerHTML=`<div class="card-head"><b>小智合成候选池</b><span>新增 ${added.size} · 删除 ${removed.length}</span></div><div class="stock-list">${rows}</div>${removedHtml}`;target?target.appendChild(el):appendAiOutput(el);return el}
    function renderAnalysisBundle(limit=poolSizes[p]||5){const body=createAiOutput();renderThinking(true,body);renderStockCard(limit,body)}
    function renderQuestions(){const el=document.createElement('article');el.className='question-card';el.innerHTML='<h3>你可以继续这样问我</h3><button class="question-btn">这批股票里哪些更适合稳健持有？</button><button class="question-btn">把资金流入最强的股票重新排序</button><button class="question-btn">哪些股票触发更新规则后会被剔除？</button>';appendAiOutput(el);el.querySelectorAll('.question-btn').forEach(btn=>btn.onclick=()=>{inputField.value=btn.textContent;sendText()})}
    function boot(){chat.innerHTML='';renderAnalysisBundle();renderQuestions()}
    function showFeedback(text){qaFeedback.textContent=text;qaFeedback.classList.add('show');setTimeout(()=>qaFeedback.classList.remove('show'),1800)}
    function updateInputActions(){const hasText=inputField.value.trim().length>0;micBtn.style.display=hasText?'none':'flex';factorBtn.style.display=hasText?'none':'flex';sendBtn.style.display=hasText?'flex':'none'}
    function toggleFactorDrawer(open){factorDrawer.classList.toggle('show',open);factorScrim.classList.toggle('show',open)}
    function sendText(){const text=inputField.value.trim();if(!text)return;toggleFactorDrawer(false);addMessage(text,true);inputField.value='';updateInputActions();setTimeout(()=>{addMessage('小智会按你的偏好重新运行模型，并同步展示股票范围、因子、评分和更新规则的变化。');renderAnalysisBundle(/稳健|分红|低波动/.test(text)?5:Math.min(10,poolSizes[p]||5));renderQuestions();content.scrollTo({top:content.scrollHeight,behavior:'smooth'})},320)}
    const factorCompose=document.getElementById('factorCompose'),selectedFactorParts={'原子模型':[],'选股因子':[]};function buildFactorIntent(){const model=selectedFactorParts['选股模型'],atomic=selectedFactorParts['原子模型']||[],factors=selectedFactorParts['选股因子']||[],parts=[model,...atomic].filter(Boolean);return parts.length||factors.length?`请小智按「${parts.join(' + ')||'当前模型'}」筛选股票，条件包括：${factors.length?factors.join('、'):'请结合默认因子'}。这些条件我可以继续修改。`:''}function updateFactorIntent(){factorCompose.disabled=!buildFactorIntent()}factorCompose.textContent='确定组合';const factorIntro=factorDrawer.querySelector('.factor-intro');if(factorIntro)factorIntro.textContent='从三层能力里自由勾选：选股模型单选，原子模型和因子可多选。确认后再写入输入框，阈值、行业和剔除条件都可以继续改。';const exampleSection=factorDrawer.querySelector('[data-example]')?.closest('.factor-section');if(exampleSection)exampleSection.remove();const factorTitles=factorDrawer.querySelectorAll('.factor-section-title');if(factorTitles[0])factorTitles[0].innerHTML='<i>1</i>选股模型 · 单选';if(factorTitles[1])factorTitles[1].innerHTML='<i>2</i>原子模型 · 多选';if(factorTitles[2])factorTitles[2].innerHTML='<i>3</i>选股因子 · 多选，可修改阈值';sendBtn.addEventListener('click',sendText);factorBtn.addEventListener('click',()=>toggleFactorDrawer(true));factorScrim.addEventListener('click',()=>toggleFactorDrawer(false));inputField.addEventListener('focus',()=>{inputVoice.style.display='none';inputNormal.style.display='flex';toggleFactorDrawer(false);updateInputActions()});inputField.addEventListener('input',updateInputActions);document.querySelectorAll('[data-factor]').forEach(btn=>btn.onclick=()=>{const dim=btn.dataset.dim||'选股因子';if(dim==='原子模型'||btn.dataset.mode==='multi'){const arr=selectedFactorParts[dim]||[];btn.classList.toggle('active');selectedFactorParts[dim]=btn.classList.contains('active')?[...new Set([...arr,btn.dataset.factor])]:arr.filter(x=>x!==btn.dataset.factor)}else{document.querySelectorAll(`[data-dim="${dim}"]`).forEach(n=>n.classList.remove('active'));btn.classList.add('active');selectedFactorParts[dim]=btn.dataset.factor}updateFactorIntent()});factorCompose.onclick=()=>{const text=buildFactorIntent();if(!text)return;inputField.value=text;toggleFactorDrawer(false);inputNormal.style.display='flex';inputVoice.style.display='none';inputField.focus();updateInputActions()};inputField.addEventListener('keypress',e=>{if(e.key==='Enter')sendText()});
    const sessions=[{title:'复核低波动持有',date:new Date('2026-07-20T18:20:00'),ask:'这些股票里哪些更适合低波动持有？',reply:'小智优先查看现金流和波动率，保留防御属性更明显的候选。',count:5},{title:'解释资金流入',date:new Date('2026-06-28T10:16:00'),ask:'资金流入的信号可靠吗？',reply:'小智把资金净流入和价格趋势做了交叉验证，短线可靠性较高。',count:10},{title:'成长风险校验',date:new Date('2025-06-17T16:00:00'),ask:'成长股里哪些波动要控制？',reply:'小智会把高成长候选按波动和估值压力重排，避免只看涨幅。',count:10}];
    historyList.innerHTML=sessions.map((s,i)=>`<button class="history-item" data-history="${i}"><b>${s.title}</b><span>${formatMessageTime(s.date)} · ${s.ask}</span></button>`).join('');
    function toggleHistory(open){historyPanel.classList.toggle('show',open);historyScrim.classList.toggle('show',open)}
    historyBtn.onclick=()=>toggleHistory(!historyPanel.classList.contains('show'));historyScrim.onclick=()=>toggleHistory(false);
    document.querySelectorAll('[data-history]').forEach(btn=>btn.onclick=()=>{const s=sessions[btn.dataset.history];toggleHistory(false);chat.innerHTML='';addMessage(s.ask,true,s.date);addMessage(s.reply,false,s.date);renderAnalysisBundle(s.count);renderQuestions();content.scrollTo({top:content.scrollHeight,behavior:'smooth'})});
    micBtn.addEventListener('click',e=>{e.preventDefault();toggleFactorDrawer(false);inputNormal.style.display='none';inputVoice.style.display='flex'});let cancelZone=false,isRecording=false;function startRecording(){isRecording=true;cancelZone=false;inputVoice.style.display='none';inputRecording.style.display='flex'}function stopRecording(cancelled){isRecording=false;inputRecording.style.display='none';if(cancelled||cancelZone){inputVoice.style.opacity='1';inputVoice.style.display='flex'}else{inputVoice.style.display='none';inputNormal.style.display='flex';showFeedback('语音已发送');addMessage('语音偏好：稳健分红，回撤低一点',true);setTimeout(()=>{addMessage('小智已按语音偏好重新压低波动权重，优先保留现金流稳定的候选。');renderAnalysisBundle(5);renderQuestions();content.scrollTo({top:content.scrollHeight,behavior:'smooth'})},320);updateInputActions()}}inputVoice.addEventListener('mousedown',e=>{e.preventDefault();startRecording()});inputVoice.addEventListener('touchstart',e=>{e.preventDefault();startRecording()});inputVoice.addEventListener('mouseup',()=>{if(isRecording)stopRecording(false)});inputVoice.addEventListener('touchend',e=>{if(isRecording){e.preventDefault();stopRecording(false)}});inputVoice.addEventListener('touchmove',e=>{if(isRecording){const touch=e.touches[0],rect=inputVoice.getBoundingClientRect();cancelZone=touch.clientY<rect.top-20;inputVoice.style.opacity=cancelZone?'.5':'1'}});inputRecording.addEventListener('touchend',e=>{e.preventDefault();stopRecording(cancelZone)});inputRecording.addEventListener('mouseup',()=>stopRecording(cancelZone));inputVoice.querySelector('.qa-voice-hint').addEventListener('click',e=>{e.stopPropagation();inputVoice.style.display='none';inputNormal.style.display='flex';inputField.focus();updateInputActions()});
    boot();
